{% extends 'checker/base.html' %}
{% block title %}Select Class{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>Select Class</h1>
  <p class="muted">Choose the class you are checking. The next page shows students needing attention and empty rows for new checking entries.</p>
  <form method="get" class="form-stack quick-select-form">
    {{ form.non_field_errors }}
    <label>{{ form.classroom.label }} {{ form.classroom }}</label>
    <button class="primary big-action" type="submit">Open Checking Page</button>
  </form>
</section>
{% endblock %}
